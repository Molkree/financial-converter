default_install_hook_types:
  - pre-commit
  - commit-msg

default_language_version:
  python: python3.14

auto_update:
  cooldown_days: 7

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 91ab4bf57e58b32adf1a122681f6ebe164d081c8  # frozen: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: requirements-txt-fixer
      - id: trailing-whitespace

  - repo: https://github.com/pycqa/isort
    rev: a333737ed43df02b18e6c95477ea1b285b3de15a  # frozen: 8.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 4160603246a6b365d4a2af661c6d71b0a0f50478  # frozen: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/asottile/pyupgrade
    rev: 75992aaa40730136014f34227e0135f63fc951b4  # frozen: v3.21.2
    hooks:
      - id: pyupgrade
        args: ["--py314-plus"]

  - repo: https://github.com/PyCQA/autoflake
    rev: 988e469555a54b0b16e39faf16ae84ff247fd337  # frozen: v2.3.3
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --remove-unused-variables
          - --remove-all-unused-imports

  - repo: https://github.com/pycqa/flake8
    rev: c48217e1fc006c2dddd14df54e83b67da15de5cd  # frozen: 7.3.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-bugbear==25.11.29
          - Flake8-pyproject==1.2.4
          - pep8-naming==0.15.1
        language: python

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 0cbe8f6e54466b1b48f9d41f44abb4d06c061b5e  # frozen: v2.2.0
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
          - httpx2==2.5.0
          - pandas-stubs==3.0.3.260530
          - pydantic-extra-types[pycountry]==2.11.1
          - pydantic-settings==2.14.2
          - pydantic==2.13.4
          - streamlit==1.59.1
          - typer==0.26.8
          - types-openpyxl==3.1.5.20260518
        language: python

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: d9fca3320346514799461a80b0753eb45d707d46  # frozen: 0.11.28
    hooks:
      - id: uv-lock
